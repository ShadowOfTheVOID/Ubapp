name: ubapp
description: Cross-platform 2D game scaffold (real-time, turn-based, social) built on Flutter and Flame.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  network_info_plus: ^5.0.3
  qr_flutter: ^4.1.0
  shelf: ^1.4.1
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.1
  vibration: ^2.0.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
