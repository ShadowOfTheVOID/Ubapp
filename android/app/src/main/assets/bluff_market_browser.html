<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Bluff Market</title>
<style>
  :root { color-scheme: dark; --bg:#000; --table:#1d2230; --card:#141414; --line:#2c2c2e;
    --text:#fff; --muted:#9da7b3; --accent:#ff2e88; --warn:#d29922; --danger:#f85149; --good:#2ea043; --wild:#7e3ff2; }
  * { box-sizing:border-box; }
  html,body{ height:100%; }
  body { margin:0; padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    background:var(--bg); color:var(--text); font-family:-apple-system, system-ui, sans-serif;
    display:flex; flex-direction:column; min-height:100%; }
  .wrap { width:100%; max-width:600px; margin:auto; padding:16px 0; text-align:center; }
  h1 { font-size:24px; margin:0 0 12px; }
  h2 { font-size:13px; margin:18px 0 8px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; }
  .panel { background:var(--card); padding:16px; border-radius:14px; margin-bottom:12px; text-align:left; }
  button, input, select { width:100%; font-size:16px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--line); background:#21262d; color:var(--text); font-family:inherit; }
  button { background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.gray { background:#30363d; color:var(--text); }
  button.good { background:var(--good); }
  button.danger { background:var(--danger); }
  button.warn { background:var(--warn); color:#1c1300; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }

  .table { background:var(--table); border-radius:18px; padding:18px; text-align:center; margin-bottom:12px;
    box-shadow: inset 0 0 60px rgba(0,0,0,.3); }
  .turn { font-size:18px; font-weight:700; margin-top:4px; }

  .players { display:flex; gap:8px; overflow-x:auto; padding:8px 0; }
  .pchip { background:#21262d; padding:8px 12px; border-radius:10px; min-width:100px; flex:0 0 auto; }
  .pchip.current { background:var(--accent); color:#fff; }
  .pchip .name { font-size:13px; font-weight:600; }
  .pchip .meta { font-size:11px; opacity:.8; }

  .hand { display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:rgba(0,0,0,.2); border-radius:14px;
    justify-content:center; }
  .card { width:80px; height:112px; background:#101013; color:#F4F4F6; border-radius:6px; padding:6px; cursor:pointer; user-select:none;
    border:1px solid rgba(255,255,255,0.10);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    box-shadow:0 8px 24px -8px rgba(0,0,0,0.35); transition:transform .12s;
    font-family:-apple-system, system-ui, sans-serif; font-weight:800; letter-spacing:-0.04em; }
  .card .val { font-size:36px; letter-spacing:-0.07em; line-height:1; }
  .card .sub { font-size:8px; opacity:.55; letter-spacing:0.10em; margin-top:4px; font-weight:500;
               font-family:'SF Mono','Roboto Mono',ui-monospace,monospace; text-transform:uppercase; }
  .card.bomb { border:1px solid rgba(255,46,136,0.55); color:#FF3D5A; }
  .card.bomb .val { color:#F4F4F6; }
  .card.bomb .sub { color:rgba(255,46,136,0.85); letter-spacing:0.20em; }
  .card.wild { border:1px solid rgba(126,63,242,0.55); color:#FF2E88; }
  .card.selected { transform:translateY(-10px); box-shadow:0 8px 16px rgba(0,0,0,.5); outline:3px solid var(--accent); }

  .trade { background:rgba(255,255,255,.06); border:1px solid var(--line); padding:12px; border-radius:12px; margin:12px 0; }
  .market-stack { position:relative; height:108px; margin:8px auto; width:80px; }
  .market-stack .back { position:absolute; width:76px; height:104px; border-radius:6px;
    background:#000; border:1px solid rgba(255,255,255,0.10);
    background-image: radial-gradient(circle, rgba(255,255,255,0.45) 1px, transparent 1.5px);
    background-size: 9px 9px; background-position: 6px 6px;
    box-shadow:0 8px 24px -8px rgba(0,0,0,0.35); }
  .commit-back { width:64px; height:90px; border-radius:6px;
    background:#000; border:1px solid rgba(255,255,255,0.10);
    background-image: radial-gradient(circle, rgba(255,255,255,0.45) 1px, transparent 1.5px);
    background-size: 8px 8px; background-position: 5px 5px;
    box-shadow:0 8px 24px -8px rgba(0,0,0,0.35); }

  .tutorial-card { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#e6edf3; padding:20px; border-radius:14px; margin-bottom:12px; }
  .tutorial-card h2 { color:#6ee7a8; font-size:18px; margin:0 0 8px; letter-spacing:0; text-transform:none; }
  .tutorial-card h3 { font-size:14px; margin:12px 0 4px; color:#e6edf3; text-transform:none; letter-spacing:0; }
  .tutorial-card p { margin:4px 0; color:#cfd8de; font-size:14px; line-height:1.45; }
  .tutorial-card .menu-label { color:#6ee7a8; font-size:16px; margin:18px 0 6px; font-weight:700; }
  .tutorial-card .wait { color:#9da7b3; font-size:13px; margin-top:14px; }
  .vote-row { display:flex; gap:8px; }
  .vote-row button { flex:1; }
  .vote-yes { background:#2ea043; }
  .vote-no { background:#f85149; }
  .vote-yes.selected, .vote-no.selected { outline:3px solid #fff; }
  /* ===== unified jamboree chrome: jamboree design system (redesign) =====
     Appended last so it wins the cascade. Refines shared shell + tokens to
     the brand spec; per-game structural CSS above is left intact. ===== */
  :root{
    --bg:#0a0a0a; --ink:#000000; --fg:#ffffff;
    --accent:#ff2e88; --accent-ink:#2a0010;
    --accent-soft:rgba(255,46,136,0.14); --accent-line:rgba(255,46,136,0.45);
    --card:#141416; --card2:#1c1c1f; --surface-hi:#1c1c1f;
    --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.14);
    --text:#ffffff; --muted:rgba(255,255,255,0.58); --faint:rgba(255,255,255,0.38);
    --online:#3ddc84;
    --sys:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--sys);
    display:flex; flex-direction:column; min-height:100%;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  .wrap{ width:100%; max-width:600px; margin:auto; padding:20px 0; text-align:center; }
  .target{ text-align:center; }
  h1{ font-size:28px; font-weight:800; letter-spacing:-0.03em; margin:0 0 14px; color:var(--fg); }
  h2{ font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--muted); margin:18px 0 8px; }
  p{ color:var(--text); }
  p.small,.small{ color:var(--muted); font-size:13px; }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:12px; }
  button, input[type=text]{ width:100%; font-size:16px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--line-strong); background:rgba(255,255,255,0.06); color:var(--text);
    font-family:inherit; box-sizing:border-box; }
  button{ background:var(--accent); color:var(--accent-ink); border:none; font-weight:700;
    cursor:pointer; letter-spacing:-0.01em; transition:filter .12s, opacity .12s; }
  button:hover{ filter:brightness(1.06); }
  button:active{ filter:brightness(0.96); }
  button:disabled{ opacity:.5; cursor:not-allowed; filter:none; }
  button.gray, button.secondary{ background:rgba(255,255,255,0.06); color:var(--text);
    border:1px solid var(--line-strong); font-weight:600; }
  input[type=text]{ background:rgba(255,255,255,0.04); }
  input[type=text]:focus{ outline:none; border-color:var(--accent-line); }
  .players{ display:flex; gap:8px; overflow-x:auto; padding:8px 0; }
  .pchip{ background:var(--card); border:1px solid var(--line); padding:8px 12px;
    border-radius:12px; min-width:96px; flex:0 0 auto; text-align:left; color:var(--text); }
  .pchip.current{ background:var(--accent-soft); border-color:var(--accent-line); color:var(--text); }
  .pchip .name{ font-size:13px; font-weight:600; }
  .pchip .hc{ font-family:var(--mono); font-size:9px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--faint); opacity:1; }
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center;
    justify-content:center; z-index:99; backdrop-filter:blur(10px); }
  .modal .panel{ max-width:360px; width:90%; border-radius:18px; }
  .vote-row{ display:flex; gap:8px; }
  .vote-row button{ flex:1; }
  .vote-yes{ background:var(--accent); color:var(--accent-ink); border:none; }
  .vote-no{ background:rgba(255,255,255,0.06); color:var(--text); border:1px solid var(--line-strong); }
  .vote-yes.selected, .vote-no.selected{ outline:2px solid var(--fg); outline-offset:1px; }
  /* tutorial card recolor — magenta brand instead of legacy green */
  .tutorial-banner{ background:var(--accent-soft); border:1px solid var(--accent-line);
    color:var(--fg); border-radius:16px; }
  .tutorial-card{ background:var(--accent-soft); border:1px solid var(--accent-line);
    color:var(--text); border-radius:16px; }
  .tutorial-card h2{ color:var(--accent); font-family:var(--sys); font-size:18px;
    letter-spacing:-0.02em; text-transform:none; }
  .tutorial-card h3{ color:var(--fg); }
  .tutorial-card p{ color:var(--muted); }
  .tutorial-card .menu-label{ color:var(--accent); }
  .tutorial-card .wait{ color:var(--faint); }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
(() => {
  const root = document.getElementById('root');
  const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  let wakeLock = null;
  async function requestWakeLock() { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
  if ('wakeLock' in navigator) {
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  }
  const state = { me:null, phase:'lobby', players:[], hand:[], marketSize:0,
    currentId:null, lastEvent:'', trade:null, turnsPerPlayer:5,
    selectedId:null, scoreRows:[], winnerId:null,
    options:{turnsPerPlayer:5, twoBombs:false, wildcard:false},
    series:{rounds:0, scores:{}},
    tutorial:{isOpen:false,yesCount:0,noCount:0,eligibleCount:0,result:null,tutorialShown:false},
    tutorialContent:null, myTutorialVote:null, tutorialPage:0 };

  function send(o){ if (ws.readyState===1) ws.send(JSON.stringify(o)); }

  ws.addEventListener('message', e => {
    let m; try { m=JSON.parse(e.data); } catch { return; }
    switch (m.type) {
      case 'welcome': state.me = { id:m.yourId, name:m.yourName }; break;
      case 'lobby': state.players = m.players; state.phase='lobby'; break;
      case 'options':
        state.options = {
          turnsPerPlayer: m.turnsPerPlayer || 5,
          twoBombs: !!m.twoBombs, wildcard: !!m.wildcard,
        };
        break;
      case 'state':
        Object.assign(state, {
          phase:m.phase, players:m.players, currentId:m.currentId,
          marketSize:m.marketSize, lastEvent:m.lastEvent || '',
          trade:m.trade || null, turnsPerPlayer:m.turnsPerPlayer || state.turnsPerPlayer,
        });
        // Don't reset selectedId when entering a trade – we need it for counter.
        if (!m.trade) state.selectedId = null;
        break;
      case 'hand': state.hand = m.cards; break;
      case 'scores': state.scoreRows = m.rows; break;
      case 'over': state.phase='gameOver'; state.winnerId = m.winnerId; state.scoreRows = m.rows; break;
      case 'reset':
        state.phase='lobby'; state.hand=[]; state.trade=null; state.marketSize=0;
        state.scoreRows=[]; state.winnerId=null; state.lastEvent=''; state.selectedId=null; break;
      case 'series_state': state.series = { rounds:m.rounds||0, scores:m.scores||{} }; break;
      case 'tutorial_vote_state': {
        const wasOpen = state.tutorial.isOpen;
        state.tutorial = { isOpen:m.isOpen, yesCount:m.yesCount, noCount:m.noCount,
          eligibleCount:m.eligibleCount, result:m.result, tutorialShown:m.tutorialShown };
        if (m.title) state.tutorialContent = { title:m.title, sections:m.sections || [], menuSections:m.menuSections || [] };
        if (!wasOpen && m.isOpen) state.myTutorialVote = null;
        break;
      }
    }
    render();
  });

  function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function nameOf(id){ const p = state.players.find(x => x.id===id); return p ? p.name : '?'; }

  function render(){
    if (!state.me) {
      root.innerHTML = `<h1>Bluff Market</h1><div class="panel"><h2>Pick a name</h2><input id="n" type="text" placeholder="Your name" maxlength="20" autofocus><div style="height:12px"></div><button id="b">Join</button></div>`;
      bindJoin(); return;
    }
    if (state.phase==='lobby') return renderLobby();
    if (state.phase==='gameOver') return renderOver();
    if (state.phase==='scoring') return renderScoring();
    return renderTable();
  }

  function seriesBanner(){
    const s = state.series; if (!s || !s.rounds) return '';
    const parts = Object.keys(s.scores).map(k => `${esc(k)} ${s.scores[k]}`).join(' · ');
    return `<div class="panel"><strong>Series</strong> — ${parts}</div>`;
  }

  function bindJoin(){
    const i=document.getElementById('n'), b=document.getElementById('b');
    if (!i||!b) return;
    const submit=()=>{ const n=i.value.trim(); if (n) send({type:'join', name:n}); };
    b.addEventListener('click', submit);
    i.addEventListener('keydown', e => { if (e.key==='Enter') submit(); });
  }

  function viewOptions(){
    const o = state.options;
    const flags = [];
    flags.push(`${o.turnsPerPlayer} turns/player`);
    if (o.twoBombs) flags.push('2 bombs');
    if (o.wildcard) flags.push('wildcard');
    return `<div class="panel"><h2>Game options</h2><p>${flags.join(' · ')}</p></div>`;
  }

  function renderLobby(){
    root.innerHTML = `<h1>Lobby</h1>${seriesBanner()}${viewTutorialBanner()}${viewTutorialVote()}${viewOptions()}<div class="panel"><p>Waiting for the host to deal.</p><h2>Players (${state.players.length})</h2>${state.players.map(p=>`<div class="pchip" style="margin-bottom:6px"><div class="name">${esc(p.name)}${p.isHost?' • host':''}${state.me.id===p.id?' • you':''}</div></div>`).join('')}</div>`;
    bindTutorialVote();
  }

  function viewTutorialBanner(){
    const t = state.tutorial, c = state.tutorialContent;
    if (t.result !== true || t.tutorialShown) return '';
    if (!c) return `<div class="tutorial-card">Loading tutorial…</div>`;
    const all = [...c.sections, ...(c.menuSections||[])];
    if (!all.length) return '';
    const pg = state.tutorialPage||0, total = all.length, s = all[pg];
    const prevBtn = pg > 0 ? `<button class="secondary" id="tut-prev" style="flex:1">← Back</button>` : '';
    const nextBtn = pg < total-1 ? `<button id="tut-next" style="flex:1">Next →</button>` : '';
    const waitMsg = pg >= total-1 ? `<p class="wait" style="margin-top:8px">Waiting for the host to finish reading.</p>` : '';
    return `<div class="tutorial-card" style="position:fixed;inset:0;border-radius:0;z-index:100;overflow-y:auto;display:flex;flex-direction:column"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h2 style="margin:0">${esc(c.title)}</h2><span style="color:var(--faint,#9da7b3);font-size:13px">${pg+1} / ${total}</span></div><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p><div style="flex:1"></div>${prevBtn||nextBtn?`<div class="vote-row" style="margin-top:12px">${prevBtn}${nextBtn}</div>`:''}${waitMsg}</div>`;
  }

  function viewTutorialVote(){
    const t = state.tutorial;
    if (t.isOpen) {
      return `<div class="panel"><h2>Show tutorial first?</h2><p>${t.yesCount + t.noCount} / ${t.eligibleCount} voted — majority wins.</p><div class="vote-row"><button class="vote-yes ${state.myTutorialVote===true?'selected':''}" id="tut-yes">Yes (${t.yesCount})</button><button class="vote-no ${state.myTutorialVote===false?'selected':''}" id="tut-no">No (${t.noCount})</button></div></div>`;
    }
    if (t.result === null && !t.tutorialShown) {
      return `<div class="panel"><p>Want a refresher on the rules?</p><button id="call-tut">Call tutorial vote</button></div>`;
    }
    if (t.result === false) return `<div class="panel"><p>Majority voted to skip the tutorial.</p></div>`;
    return '';
  }

  function bindTutorialVote(){
    const cb = document.getElementById('call-tut');
    if (cb) cb.addEventListener('click', () => send({type:'call_tutorial_vote'}));
    const y = document.getElementById('tut-yes'), n = document.getElementById('tut-no');
    if (y) y.addEventListener('click', () => { state.myTutorialVote=true; send({type:'tutorial_vote', yes:true}); render(); });
    if (n) n.addEventListener('click', () => { state.myTutorialVote=false; send({type:'tutorial_vote', yes:false}); render(); });
    const prev = document.getElementById('tut-prev'), next = document.getElementById('tut-next');
    if (prev) prev.addEventListener('click', () => { state.tutorialPage = Math.max(0, (state.tutorialPage||0)-1); render(); });
    if (next) next.addEventListener('click', () => { const a = state.tutorialContent ? [...state.tutorialContent.sections, ...(state.tutorialContent.menuSections||[])] : []; state.tutorialPage = Math.min(a.length-1, (state.tutorialPage||0)+1); render(); });
  }

  function cardEl(c, opts={}){
    const sel = opts.selected ? 'selected' : '';
    const cls = ['card', c.kind === 'bomb' ? 'bomb' : (c.kind === 'wildcard' ? 'wild' : ''), sel].join(' ');
    const attrs = opts.id !== false ? ` data-id="${c.id}"` : '';
    let val, sub;
    if (c.kind === 'bomb') { val = '−25'; sub = 'BOMB'; }
    else if (c.kind === 'wildcard') { val = 'WILD'; sub = 'wild'; }
    else { val = c.label; sub = c.value === 1 ? 'PT' : 'PTS'; }
    return `<div class="${cls}"${attrs}><div class="val">${esc(val)}</div><div class="sub">${esc(sub)}</div></div>`;
  }

  function renderTable(){
    const isMyTurn = state.currentId === state.me.id;
    const playersBar = state.players.map(p => {
      const isCurrent = state.currentId === p.id;
      const guar = p.guaranteeUsed ? '' : '<div class="meta" style="color:#facc15">Guar</div>';
      return `<div class="pchip ${isCurrent?'current':''}"><div class="name">${esc(p.name)}${state.me.id===p.id?' (you)':''}</div><div class="meta">${p.handCount}c · ${p.coins}$</div><div class="meta">turn ${p.turnsTaken}/${state.turnsPerPlayer}</div>${guar}</div>`;
    }).join('');

    const handHtml = state.hand.map(c => cardEl(c, {selected: state.selectedId === c.id})).join('');

    let actions = '';
    if (!state.trade && isMyTurn) {
      actions = `<div class="row" style="margin-top:8px">
        <button id="buy" ${state.marketSize===0?'disabled':''}>Buy market</button>
        <button id="sell" class="gray" ${state.selectedId?'':'disabled'}>Sell selected (+2)</button>
      </div>`;
      const targets = state.players.filter(p => p.id !== state.me.id);
      const targetBtns = targets.map(p =>
        `<button class="propose" data-target="${p.id}" ${state.selectedId?'':'disabled'}>Trade with ${esc(p.name)}</button>`
      ).join('');
      actions += `<div class="panel" style="margin-top:8px"><h2>Propose trade (offer selected)</h2>${targetBtns}</div>`;
    }

    let tradeHtml = '';
    if (state.trade) tradeHtml = renderTrade(state.trade);

    root.innerHTML = `
      <div class="players">${playersBar}</div>
      <div class="table">
        ${state.marketSize > 0 ? `<div class="market-stack">${Array.from({length: Math.min(state.marketSize, 4)}, (_, i) => `<div class="back" style="transform: translate(${i*1.5}px, ${i*1.5}px)"></div>`).join('')}</div>` : ''}
        <div>Market: ${state.marketSize} card${state.marketSize===1?'':'s'} face down</div>
        <div class="turn">${isMyTurn ? 'Your turn — Trade, Buy, or Sell' : esc(nameOf(state.currentId))+'’s turn'}</div>
        ${state.lastEvent ? `<div style="opacity:.7;font-size:13px;margin-top:8px">${esc(state.lastEvent)}</div>` : ''}
      </div>
      ${tradeHtml}
      <div class="hand">${handHtml || '<p style="color:var(--muted);padding:12px">No cards</p>'}</div>
      ${actions}
    `;
    bindTable();
  }

  function renderTrade(t){
    const imProposer = t.proposerId === state.me.id;
    const imTarget = t.targetId === state.me.id;
    const imParty = imProposer || imTarget;
    const myGuar = (state.players.find(p => p.id === state.me.id) || {}).guaranteeUsed;
    let body = '';
    if (!imParty) {
      // Trades are private: onlookers see who's trading, never the cards.
      body = `<p style="color:var(--muted)">${esc(nameOf(t.proposerId))} and ${esc(nameOf(t.targetId))} are trading privately…</p>`;
      return `<div class="trade"><h2>Trade: ${esc(nameOf(t.proposerId))} ↔ ${esc(nameOf(t.targetId))}</h2>${body}</div>`;
    }
    if (t.revealed) {
      body += `<div class="row" style="align-items:center"><div>${esc(nameOf(t.proposerId))}<br>${cardEl(t.proposerCard, {id:false})}</div><div style="flex:0;padding:0 8px;font-size:24px">⇄</div><div>${esc(nameOf(t.targetId))}<br>${cardEl(t.targetCard, {id:false})}</div></div>`;
      if (imParty) {
        const answered = imProposer ? t.proposerAccept !== undefined : t.targetAccept !== undefined;
        if (answered) {
          body += `<p style="color:var(--muted)">You answered. Waiting…</p>`;
        } else {
          body += `<div class="row" style="margin-top:8px">
            <button class="good" id="accept">Accept</button>
            <button class="danger" id="reject">Reject</button>
            ${myGuar ? '' : '<button class="warn" id="guar">Guarantee</button>'}
          </div>`;
        }
      }
    } else {
      // Pre-reveal: show face-down placeholders so everyone can see who's
      // committed without revealing the cards.
      body += `<div class="row" style="align-items:center;justify-content:center;gap:16px;margin-bottom:8px">
        <div style="text-align:center"><div style="font-size:11px;opacity:.7;margin-bottom:4px">${esc(nameOf(t.proposerId))}</div><div class="commit-back" style="opacity:${t.proposerCommitted ? 1 : 0.3}"></div></div>
        <div style="font-size:24px;font-weight:700">?</div>
        <div style="text-align:center"><div style="font-size:11px;opacity:.7;margin-bottom:4px">${esc(nameOf(t.targetId))}</div><div class="commit-back" style="opacity:${t.targetCommitted ? 1 : 0.3}"></div></div>
      </div>`;
      if (imTarget) {
        body += `<p>${esc(nameOf(t.proposerId))} is proposing a trade. Commit a card from your hand below to counter.</p>`;
        body += `<div class="row"><button id="counter" ${state.selectedId?'':'disabled'}>Commit selected</button><button id="decline" class="danger">Decline</button></div>`;
      } else if (imProposer) {
        body += `<p>You committed. Waiting for ${esc(nameOf(t.targetId))} to counter…</p>`;
        body += `<button id="decline" class="danger">Cancel proposal</button>`;
      }
    }
    const guarLine = (t.proposerGuarantee || t.targetGuarantee)
      ? '<p style="color:#facc15">Guarantee invoked — trade will be forced.</p>' : '';
    return `<div class="trade"><h2>Trade: ${esc(nameOf(t.proposerId))} ↔ ${esc(nameOf(t.targetId))}</h2>${body}${guarLine}</div>`;
  }

  function renderScoring(){
    const rows = state.scoreRows.slice().sort((a,b)=>b.total-a.total);
    root.innerHTML = `<h1>Final scores — pending host reveal</h1><div class="panel">${rows.map(r=>`<div class="pchip" style="margin-bottom:6px"><div class="name">${esc(r.name)}${r.hasBomb?' 💣':''}</div><div class="meta">${r.total} (sum ${r.sum} + coins ${r.coins})</div></div>`).join('')}<p style="color:var(--muted);margin-top:16px">Waiting for the host…</p></div>`;
  }

  function renderOver(){
    const rows = state.scoreRows.slice().sort((a,b)=>b.total-a.total);
    const winnerName = (rows.find(r => r.id === state.winnerId) || {}).name || '?';
    root.innerHTML = `<h1>Game over</h1>${seriesBanner()}<div class="panel"><p style="text-align:center;font-size:24px;font-weight:700">${esc(winnerName)} wins!</p>${rows.map(r=>`<div class="pchip" style="margin-bottom:6px"><div class="name">${esc(r.name)}${r.hasBomb?' 💣':''}${r.id===state.winnerId?' 🏆':''}</div><div class="meta">${r.total} (sum ${r.sum} + coins ${r.coins})</div></div>`).join('')}</div>`;
  }

  function bindTable(){
    document.querySelectorAll('.hand .card').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        state.selectedId = (state.selectedId === id) ? null : id;
        render();
      });
    });
    const buy = document.getElementById('buy');
    if (buy) buy.addEventListener('click', () => send({type:'buy'}));
    const sell = document.getElementById('sell');
    if (sell) sell.addEventListener('click', () => {
      if (!state.selectedId) return;
      send({type:'sell', cardId: state.selectedId});
      state.selectedId = null;
    });
    document.querySelectorAll('.propose').forEach(b => {
      b.addEventListener('click', () => {
        if (!state.selectedId) return;
        send({type:'propose_trade', targetId: b.dataset.target, cardId: state.selectedId});
        state.selectedId = null;
      });
    });
    const counter = document.getElementById('counter');
    if (counter) counter.addEventListener('click', () => {
      if (!state.selectedId) return;
      send({type:'counter_trade', cardId: state.selectedId});
      state.selectedId = null;
    });
    const dec = document.getElementById('decline');
    if (dec) dec.addEventListener('click', () => send({type:'decline_trade'}));
    const acc = document.getElementById('accept');
    if (acc) acc.addEventListener('click', () => send({type:'respond_trade', accept:true}));
    const rej = document.getElementById('reject');
    if (rej) rej.addEventListener('click', () => send({type:'respond_trade', accept:false}));
    const g = document.getElementById('guar');
    if (g) g.addEventListener('click', () => send({type:'guarantee'}));
  }

  render();
})();
</script>
</body>
</html>
