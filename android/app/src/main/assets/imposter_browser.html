
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Imposter</title>
<style>
  :root { color-scheme: dark; --bg:#0d1117; --card:#161b22; --card2:#21262d;
    --line:#30363d; --text:#e6edf3; --muted:#9da7b3; --accent:#7c3aed;
    --danger:#f85149; --good:#2ea043; --warn:#d29922; }
  * { box-sizing: border-box; }
  body { margin:0; padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    background:var(--bg); color:var(--text); font-family:-apple-system, system-ui, sans-serif; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 0; }
  h1 { font-size: 28px; margin: 0 0 16px; }
  h2 { font-size: 14px; margin: 24px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
  .card { background:var(--card); border-radius:16px; padding:20px; margin-bottom:16px; }
  button, input[type=text] { width:100%; font-size:16px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--line); background:var(--card2); color:var(--text); font-family:inherit; }
  button { background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .pill { display:inline-block; background:var(--card2); padding:4px 10px; border-radius:999px; font-size:12px; color:var(--muted); }
  .pill.you { background:var(--accent); color:#fff; }
  .player { display:flex; align-items:center; justify-content:space-between;
    background:var(--card2); padding:12px 16px; border-radius:12px; margin-bottom:8px; }
  .target { width:100%; background:var(--card2); border:1px solid var(--line);
    color:var(--text); padding:16px; border-radius:12px; font-size:16px; text-align:left; cursor:pointer; }
  .target.selected { background:var(--accent); border-color:var(--accent); color:#fff; }
  .secret-card { padding:32px; text-align:center; border-radius:20px;
    background:linear-gradient(160deg, #1f3b2c, #0d2a1f); }
  .secret-card.imposter { background:linear-gradient(160deg, #4c1d24, #2a1116); }
  .secret-card .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:2px; }
  .secret-card .word { font-size:42px; font-weight:800; margin-top:8px; }
  .secret-card .category { font-size:14px; margin-top:6px; color:var(--muted); }
  .center { text-align:center; }
  .small { color:var(--muted); font-size:13px; }
  .vote-row { display:flex; gap:8px; }
  .vote-row button { flex:1; }
  .vote-yes { background:var(--good); }
  .vote-no { background:var(--danger); }
  .vote-yes.selected, .vote-no.selected { outline:3px solid #fff; }
  .tutorial-banner { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#6ee7a8; padding:20px; border-radius:16px; margin-bottom:16px; text-align:center; font-weight:600; }
  .tutorial-card { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#e6edf3; padding:20px; border-radius:16px; margin-bottom:16px; }
  .tutorial-card h2 { color:#6ee7a8; font-size:18px; margin:0 0 8px; letter-spacing:0; text-transform:none; }
  .tutorial-card h3 { font-size:14px; margin:12px 0 4px; color:#e6edf3; text-transform:none; letter-spacing:0; }
  .tutorial-card p { margin:4px 0; color:#cfd8de; font-size:14px; line-height:1.45; }
  .tutorial-card .t-sec { margin-top:6px; }
  .tutorial-card .menu-label { color:#6ee7a8; font-size:16px; margin:18px 0 6px; font-weight:700; }
  .tutorial-card .wait { color:#9da7b3; font-size:13px; margin-top:14px; }
  /* ===== unified ubapp chrome: shared palette + centered layout ===== */
  :root{
    --bg:#000000; --card:#141414; --card2:#1f1f1f;
    --line:#2c2c2e; --text:#ffffff; --muted:#9da7b3; --accent:#ff2e88;
  }
  html,body{ height:100%; }
  body{ display:flex; flex-direction:column; min-height:100%; }
  .wrap{ width:100%; margin:auto; padding:24px 16px; text-align:center; }
  .target{ text-align:center; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
(() => {
  const root = document.getElementById('root');
  const ws = new WebSocket(`wss://${location.host}/ws`);
  const state = { me:null, phase:'lobby', players:[], category:'', word:null, isImposter:false, hideCategory:false, isDecoy:false, picked:null, voted:false, result:null,
    options:{imposterCount:1, decoyWord:false, hideCategory:false, mixedPool:false, maxImposterCount:1},
    tutorial:{isOpen:false,yesCount:0,noCount:0,eligibleCount:0,result:null,tutorialShown:false}, tutorialContent:null, myTutorialVote:null };

  function send(o){ if (ws.readyState===1) ws.send(JSON.stringify(o)); }

  ws.addEventListener('message', e => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    switch (m.type) {
      case 'welcome': state.me = { id:m.yourId, name:m.yourName }; break;
      case 'lobby':   state.players = m.players; state.phase='lobby'; break;
      case 'options': state.options = { imposterCount:m.imposterCount||1, decoyWord:!!m.decoyWord, hideCategory:!!m.hideCategory, mixedPool:!!m.mixedPool, maxImposterCount:m.maxImposterCount||1 }; break;
      case 'role':    state.category = m.category; state.word = m.word; state.isImposter = !!m.isImposter; state.hideCategory = !!m.hideCategory; state.isDecoy = !!m.isDecoy; state.phase='playing'; state.voted=false; state.picked=null; state.result=null; break;
      case 'voting':  state.phase='voting'; state.picked=null; state.voted=false; break;
      case 'result':  state.phase='result'; state.result = m; break;
      case 'reset':   state.phase='lobby'; state.word=null; state.result=null; break;
      case 'tutorial_vote_state': {
        const wasOpen = state.tutorial.isOpen;
        state.tutorial = { isOpen:m.isOpen, yesCount:m.yesCount, noCount:m.noCount, eligibleCount:m.eligibleCount, result:m.result, tutorialShown:m.tutorialShown };
        if (m.title) state.tutorialContent = { title:m.title, sections:m.sections || [], menuSections:m.menuSections || [] };
        if (!wasOpen && m.isOpen) state.myTutorialVote = null;
        break;
      }
    }
    render();
  });

  function render(){
    if (!state.me) return root.innerHTML = `<h1>Imposter</h1><div class="card"><h2>Pick a name</h2><input id="n" type="text" placeholder="Your name" maxlength="20" autofocus><div style="height:12px"></div><button id="b">Join</button></div>`;
    if (state.phase==='lobby')  return renderLobby();
    if (state.phase==='playing')return renderPlaying();
    if (state.phase==='voting') return renderVoting();
    if (state.phase==='result') return renderResult();
  }

  function renderLobby(){
    root.innerHTML = `<h1>Lobby</h1>${viewTutorialBanner()}${viewTutorialVote()}${viewOptions()}<div class="card"><p class="small">Waiting for the host to start.</p><h2>Players (${state.players.length})</h2>${state.players.map(p=>`<div class="player"><span>${esc(p.name)}${p.isHost?' <span class="pill">host</span>':''}</span>${state.me.id===p.id?'<span class="pill you">you</span>':''}</div>`).join('')}</div>`;
  }

  function viewOptions(){
    const o = state.options;
    const flags = [];
    if (o.decoyWord) flags.push('decoy word');
    if (o.hideCategory) flags.push('hide category');
    if (o.mixedPool) flags.push('mixed pool');
    const flagsLine = flags.length ? flags.join(' · ') : 'classic rules';
    return `<div class="card"><h2>Game options</h2><p class="small">Imposters: <strong>${o.imposterCount}</strong> · ${flagsLine}</p></div>`;
  }

  function viewTutorialBanner(){
    const t = state.tutorial;
    const c = state.tutorialContent;
    if (t.result !== true || t.tutorialShown) return '';
    if (!c) return `<div class="tutorial-banner">Loading tutorial…</div>`;
    const ruleSecs = c.sections.map(s => `<div class="t-sec"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('');
    const menuSecs = (c.menuSections || []).map(s => `<div class="t-sec"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('');
    return `<div class="tutorial-card"><h2>${esc(c.title)}</h2>${ruleSecs}${menuSecs ? `<div class="menu-label">Using this screen</div>${menuSecs}` : ''}<p class="wait">Waiting for the host to finish reading. They'll dismiss this when everyone is ready.</p></div>`;
  }

  function viewTutorialVote(){
    const t = state.tutorial;
    if (t.isOpen) {
      return `<div class="card"><h2>Show tutorial first?</h2><p class="small">${t.yesCount + t.noCount} / ${t.eligibleCount} voted — majority wins.</p><div class="vote-row"><button class="vote-yes ${state.myTutorialVote===true?'selected':''}" id="tut-yes">Yes (${t.yesCount})</button><button class="vote-no ${state.myTutorialVote===false?'selected':''}" id="tut-no">No (${t.noCount})</button></div></div>`;
    }
    if (t.result === null && !t.tutorialShown) {
      return `<div class="card"><p class="small">Want a refresher on the rules?</p><button id="call-tut">Call tutorial vote</button></div>`;
    }
    if (t.result === false) return `<div class="card center"><p class="small">Majority voted to skip the tutorial.</p></div>`;
    return '';
  }

  function bindTutorialVote(){
    const cb = document.getElementById('call-tut');
    if (cb) cb.addEventListener('click', () => send({type:'call_tutorial_vote'}));
    const y = document.getElementById('tut-yes'), n = document.getElementById('tut-no');
    if (y) y.addEventListener('click', () => { state.myTutorialVote=true; send({type:'tutorial_vote', yes:true}); render(); });
    if (n) n.addEventListener('click', () => { state.myTutorialVote=false; send({type:'tutorial_vote', yes:false}); render(); });
  }

  function renderPlaying(){
    let card;
    if (state.isImposter) {
      const catLine = state.hideCategory ? '' : `<div class="category">Category: <strong>${esc(state.category)}</strong></div>`;
      const decoyLine = state.isDecoy && state.word
        ? `<div class="category">Decoy word: <strong>${esc(state.word)}</strong></div><p class="small">This isn't the real word — bluff carefully.</p>`
        : `<p class="small">Bluff your way through. Don't get voted out.</p>`;
      card = `<div class="secret-card imposter"><div class="label">your role</div><div class="word">IMPOSTER</div>${catLine}${decoyLine}</div>`;
    } else {
      card = `<div class="secret-card"><div class="label">secret word</div><div class="word">${esc(state.word||'')}</div><div class="category">Category: <strong>${esc(state.category)}</strong></div><p class="small">Discuss in person. Find the imposter.</p></div>`;
    }
    root.innerHTML = card + `<div class="card center small">Waiting for the host to call a vote…</div>`;
  }

  function renderVoting(){
    const others = state.players.filter(p=>p.id !== state.me.id);
    root.innerHTML = `<h1>Vote</h1><div class="card"><h2>Pick the imposter</h2>${others.map(p=>`<button class="target ${state.picked===p.id?'selected':''}" data-id="${p.id}" ${state.voted?'disabled':''}>${esc(p.name)}</button>`).join('')}<button class="target ${state.picked==='__skip'?'selected':''}" data-id="__skip" ${state.voted?'disabled':''}>Skip</button><div style="height:12px"></div><button id="confirm" ${(state.voted||!state.picked)?'disabled':''}>${state.voted?'Vote in ✓':'Lock in vote'}</button></div>`;
    document.querySelectorAll('.target').forEach(b=>b.addEventListener('click',()=>{state.picked=b.dataset.id;render();}));
    const c = document.getElementById('confirm');
    if (c) c.addEventListener('click', ()=>{
      const t = state.picked==='__skip' ? null : state.picked;
      send({type:'vote', targetId:t}); state.voted=true; render();
    });
  }

  function renderResult(){
    const r = state.result;
    const winner = r.winner==='town' ? 'Town wins' : 'Imposter wins';
    const accused = r.mostVotedId ? r.players.find(p=>p.id===r.mostVotedId) : null;
    const ids = Array.isArray(r.imposterIds) ? r.imposterIds : (r.imposterId ? [r.imposterId] : []);
    const names = ids.map(id => { const p = r.players.find(pp=>pp.id===id); return p ? p.name : '?'; });
    const label = names.length === 1 ? 'imposter was' : 'imposters were';
    const impLine = names.length ? `<p>The ${label} <strong>${esc(names.join(', '))}</strong>.</p>` : '';
    root.innerHTML = `<h1>${winner}</h1><div class="card center">${impLine}${accused?`<p>You voted out <strong>${esc(accused.name)}</strong>${r.imposterCaught?' — correct!':' — wrong!'}</p>`:'<p>The vote tied — no one was eliminated.</p>'}<p>Secret word was <strong>${esc(r.word)}</strong> (${esc(r.category)}).</p></div><div class="card center small">Waiting for the host to start a new round…</div>`;
  }

  // join handler bind
  function bindJoin(){
    const i = document.getElementById('n'), b = document.getElementById('b');
    if (!i || !b) return;
    const submit = () => { const n=i.value.trim(); if (n) send({type:'join', name:n}); };
    b.addEventListener('click', submit);
    i.addEventListener('keydown', e => { if (e.key==='Enter') submit(); });
  }

  function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // patch: re-bind join + tutorial vote after first render
  const _r = render;
  render = () => { _r(); bindJoin(); bindTutorialVote(); };
  render();
})();
</script>
</body>
</html>
