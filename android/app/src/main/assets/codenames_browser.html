
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Codenames</title>
<style>
  :root { color-scheme: dark; --bg:#0d1117; --card:#161b22; --card2:#21262d;
    --line:#30363d; --text:#e6edf3; --muted:#9da7b3;
    --red:#dc3545; --blue:#0d6efd; --neutral:#a89985; --assassin:#1f1f1f;
    --accent:#5865f2; }
  * { box-sizing:border-box; }
  body { margin:0; padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    background:var(--bg); color:var(--text); font-family:-apple-system, system-ui, sans-serif; }
  .wrap { max-width:720px; margin:0 auto; padding:16px 0; }
  h1 { font-size:24px; margin:0 0 12px; }
  h2 { font-size:13px; margin:16px 0 6px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; }
  .panel { background:var(--card); padding:14px; border-radius:14px; margin-bottom:12px; }
  button, input[type=text], input[type=number], select {
    width:100%; font-size:16px; padding:12px 14px; border-radius:10px;
    border:1px solid var(--line); background:var(--card2); color:var(--text); font-family:inherit; }
  button { background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.red { background:var(--red); }
  button.blue { background:var(--blue); }
  button.outline { background:transparent; border:1px solid var(--line); }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }

  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:6px 0; }
  .tile { aspect-ratio:1.4/1; border-radius:8px; background:#d9c89b; color:#000; font-weight:700;
    display:flex; align-items:center; justify-content:center; padding:4px; text-align:center;
    font-size:13px; cursor:pointer; user-select:none;
    box-shadow:0 1px 2px rgba(0,0,0,.3); transition:transform .12s; word-break:break-word; }
  .tile.red    { background:var(--red); color:#fff; }
  .tile.blue   { background:var(--blue); color:#fff; }
  .tile.neutral{ background:var(--neutral); color:#000; }
  .tile.assassin{ background:var(--assassin); color:#fff; border:2px solid #444; }
  .tile.revealed { opacity:.4; cursor:not-allowed; }
  .tile.locked { cursor:not-allowed; }

  /* Spymaster only — show colors as a subtle border */
  .tile.sm-red    { box-shadow: inset 0 0 0 4px var(--red); }
  .tile.sm-blue   { box-shadow: inset 0 0 0 4px var(--blue); }
  .tile.sm-neutral{ box-shadow: inset 0 0 0 4px #8d7959; }
  .tile.sm-assassin{ box-shadow: inset 0 0 0 4px #000, inset 0 0 0 8px #fff; }

  .scoreboard { display:flex; gap:8px; margin-bottom:8px; }
  .score { flex:1; padding:10px; border-radius:10px; text-align:center; font-weight:700; }
  .score.red { background:var(--red); color:#fff; }
  .score.blue { background:var(--blue); color:#fff; }
  .turn-banner { padding:12px; border-radius:10px; text-align:center; font-weight:600; margin-bottom:8px; }
  .turn-banner.red { background:rgba(220,53,69,.18); color:#ff8a90; border:1px solid var(--red); }
  .turn-banner.blue { background:rgba(13,110,253,.18); color:#7ab1ff; border:1px solid var(--blue); }
  .clue { font-size:18px; font-weight:700; padding:10px; background:var(--card2); border-radius:10px; text-align:center; }

  .small { color:var(--muted); font-size:13px; }
  .pill { display:inline-block; padding:2px 8px; border-radius:8px; font-size:11px; font-weight:600; background:var(--card2); color:var(--muted); }
  .pill.r { background:var(--red); color:#fff; }
  .pill.b { background:var(--blue); color:#fff; }
  .pill.you { background:var(--accent); color:#fff; }
  .vote-row { display:flex; gap:8px; }
  .vote-row button { flex:1; }
  .vote-yes { background:#2ea043; }
  .vote-no { background:#dc3545; }
  .vote-yes.selected, .vote-no.selected { outline:3px solid #fff; }
  .tutorial-banner { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#6ee7a8; padding:18px; border-radius:14px; margin-bottom:12px; text-align:center; font-weight:600; }
  .tutorial-card { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#e6edf3; padding:20px; border-radius:14px; margin-bottom:12px; }
  .tutorial-card h2 { color:#6ee7a8; font-size:18px; margin:0 0 8px; letter-spacing:0; text-transform:none; }
  .tutorial-card h3 { font-size:14px; margin:12px 0 4px; color:#e6edf3; text-transform:none; letter-spacing:0; }
  .tutorial-card p { margin:4px 0; color:#cfd8de; font-size:14px; line-height:1.45; }
  .tutorial-card .t-sec { margin-top:6px; }
  .tutorial-card .menu-label { color:#6ee7a8; font-size:16px; margin:18px 0 6px; font-weight:700; }
  .tutorial-card .wait { color:#9da7b3; font-size:13px; margin-top:14px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
(() => {
  const root = document.getElementById('root');
  const ws = new WebSocket(`ws://${location.host}/ws`);
  const state = { me:null, isSpymaster:false, myTeam:null, phase:'lobby', players:[],
    board:[], currentTeam:null, currentClue:null, currentNumber:0, guessesLeft:0,
    redLeft:0, blueLeft:0, winner:null, endReason:null, lastEvent:'',
    smView:null, // [{kind}] for spymaster only
    clueText:'', clueNumber:1,
    tutorial:{isOpen:false,yesCount:0,noCount:0,eligibleCount:0,result:null,tutorialShown:false}, tutorialContent:null, myTutorialVote:null };

  function send(o){ if (ws.readyState===1) ws.send(JSON.stringify(o)); }

  ws.addEventListener('message', e => {
    let m; try { m=JSON.parse(e.data); } catch { return; }
    switch (m.type) {
      case 'welcome': state.me = { id:m.yourId, name:m.yourName }; break;
      case 'lobby': state.players = m.players; state.phase='lobby'; break;
      case 'role': state.isSpymaster = !!m.isSpymaster; state.myTeam = m.team; state.smView = m.smView || null; break;
      case 'state':
        state.board = m.board; state.currentTeam = m.currentTeam;
        state.currentClue = m.currentClue; state.currentNumber = m.currentNumber;
        state.guessesLeft = m.guessesLeft; state.redLeft = m.redLeft; state.blueLeft = m.blueLeft;
        state.phase = m.phase; state.winner = m.winner; state.endReason = m.endReason;
        state.lastEvent = m.lastEvent || ''; break;
      case 'reset': state.phase='lobby'; state.board=[]; state.winner=null; state.smView=null; break;
      case 'tutorial_vote_state': {
        const wasOpen = state.tutorial.isOpen;
        state.tutorial = { isOpen:m.isOpen, yesCount:m.yesCount, noCount:m.noCount, eligibleCount:m.eligibleCount, result:m.result, tutorialShown:m.tutorialShown };
        if (m.title) state.tutorialContent = { title:m.title, sections:m.sections || [], menuSections:m.menuSections || [] };
        if (!wasOpen && m.isOpen) state.myTutorialVote = null;
        break;
      }
    }
    render();
  });

  function render(){
    if (!state.me) {
      root.innerHTML = `<h1>Codenames</h1><div class="panel"><h2>Pick a name</h2><input id="n" type="text" placeholder="Your name" maxlength="20" autofocus><div style="height:10px"></div><button id="b">Join</button></div>`;
      bindJoin(); return;
    }
    if (state.phase==='lobby') return renderLobby();
    return renderGame();
  }

  function bindJoin(){
    const i=document.getElementById('n'), b=document.getElementById('b');
    if (!i||!b) return;
    const submit=()=>{ const n=i.value.trim(); if (n) send({type:'join', name:n}); };
    b.addEventListener('click', submit);
    i.addEventListener('keydown', e => { if (e.key==='Enter') submit(); });
  }

  function renderLobby(){
    const myTeamButtons = `<div class="row">
      <button class="red" id="join-red">Join Red</button>
      <button class="blue" id="join-blue">Join Blue</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button class="outline" id="be-sm" ${!state.myTeam?'disabled':''}>${state.isSpymaster?'Step down as spymaster':'Be Spymaster'}</button>
    </div>`;

    const list = state.players.map(p => {
      const teamPill = p.team==='red' ? '<span class="pill r">red</span>' : (p.team==='blue' ? '<span class="pill b">blue</span>' : '');
      const sm = p.isSpymaster ? ' <span class="pill">spymaster</span>' : '';
      const you = state.me.id===p.id ? ' <span class="pill you">you</span>' : '';
      return `<div class="panel" style="margin:0 0 6px;padding:8px 12px"><strong>${esc(p.name)}</strong>${p.isHost?' (host)':''} ${teamPill}${sm}${you}</div>`;
    }).join('');

    root.innerHTML = `<h1>Codenames</h1>
      ${viewTutorialBanner()}
      ${viewTutorialVote()}
      <div class="panel">${myTeamButtons}</div>
      <div class="panel"><p class="small">Need ≥2 per team, one spymaster each. Host starts when ready.</p>${list}</div>`;
    document.getElementById('join-red').addEventListener('click', ()=>send({type:'team', team:'red'}));
    document.getElementById('join-blue').addEventListener('click', ()=>send({type:'team', team:'blue'}));
    document.getElementById('be-sm').addEventListener('click', ()=>send({type:'spymaster', on:!state.isSpymaster}));
    bindTutorialVote();
  }

  function viewTutorialBanner(){
    const t = state.tutorial;
    const c = state.tutorialContent;
    if (t.result !== true || t.tutorialShown) return '';
    if (!c) return `<div class="tutorial-banner">Loading tutorial…</div>`;
    const ruleSecs = c.sections.map(s => `<div class="t-sec"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('');
    const menuSecs = (c.menuSections || []).map(s => `<div class="t-sec"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('');
    return `<div class="tutorial-card"><h2>${esc(c.title)}</h2>${ruleSecs}${menuSecs ? `<div class="menu-label">Using this screen</div>${menuSecs}` : ''}<p class="wait">Waiting for the host to finish reading. They'll dismiss this when everyone is ready.</p></div>`;
  }

  function viewTutorialVote(){
    const t = state.tutorial;
    if (t.isOpen) {
      return `<div class="panel"><h2>Show tutorial first?</h2><p class="small">${t.yesCount + t.noCount} / ${t.eligibleCount} voted — majority wins.</p><div class="vote-row"><button class="vote-yes ${state.myTutorialVote===true?'selected':''}" id="tut-yes">Yes (${t.yesCount})</button><button class="vote-no ${state.myTutorialVote===false?'selected':''}" id="tut-no">No (${t.noCount})</button></div></div>`;
    }
    if (t.result === null && !t.tutorialShown) {
      return `<div class="panel"><p class="small">Want a refresher on the rules?</p><button id="call-tut">Call tutorial vote</button></div>`;
    }
    if (t.result === false) return `<div class="panel" style="text-align:center"><p class="small">Majority voted to skip the tutorial.</p></div>`;
    return '';
  }

  function bindTutorialVote(){
    const cb = document.getElementById('call-tut');
    if (cb) cb.addEventListener('click', () => send({type:'call_tutorial_vote'}));
    const y = document.getElementById('tut-yes'), n = document.getElementById('tut-no');
    if (y) y.addEventListener('click', () => { state.myTutorialVote=true; send({type:'tutorial_vote', yes:true}); render(); });
    if (n) n.addEventListener('click', () => { state.myTutorialVote=false; send({type:'tutorial_vote', yes:false}); render(); });
  }

  function renderGame(){
    const over = state.phase==='gameOver';
    const myTurn = state.currentTeam === state.myTeam;
    const isSm = state.isSpymaster;

    const scoreboard = `<div class="scoreboard">
      <div class="score red">RED · ${state.redLeft}</div>
      <div class="score blue">BLUE · ${state.blueLeft}</div>
    </div>`;

    const banner = over
      ? `<div class="turn-banner ${state.winner}"><strong>${state.winner.toUpperCase()} wins.</strong> ${esc(state.endReason||'')}</div>`
      : `<div class="turn-banner ${state.currentTeam}">${state.currentTeam.toUpperCase()}'s turn${myTurn?' — you':''}${isSm?' (spymaster)':''}</div>`;

    const clueDisplay = !over && state.currentClue
      ? `<div class="clue">Clue: <span style="font-size:22px">"${esc(state.currentClue)}"</span> · ${state.currentNumber} · ${state.guessesLeft} guesses left</div>`
      : (!over && isSm && myTurn ? renderClueInput() : '');

    const grid = `<div class="grid">${state.board.map((c, i) => renderTile(c, i)).join('')}</div>`;

    const endTurnBtn = !over && myTurn && !isSm && state.currentClue && state.guessesLeft < state.currentNumber + 1
      ? '<button class="outline" id="end-turn" style="margin-top:8px">End turn</button>' : '';

    const lastEv = state.lastEvent ? `<p class="small" style="text-align:center">${esc(state.lastEvent)}</p>` : '';

    root.innerHTML = `${scoreboard}${banner}${clueDisplay}${grid}${endTurnBtn}${lastEv}`;
    bindGame();
  }

  function renderClueInput(){
    return `<div class="panel">
      <h2>Your clue (one word + number)</h2>
      <div class="row">
        <input type="text" id="clue" placeholder="WORD" maxlength="20" value="${esc(state.clueText)}">
        <input type="number" id="num" min="0" max="9" value="${state.clueNumber}" style="max-width:80px">
      </div>
      <div style="height:8px"></div>
      <button id="submit-clue">Submit clue</button>
    </div>`;
  }

  function renderTile(c, i){
    const cls = ['tile'];
    if (c.revealed) {
      cls.push('revealed');
      cls.push(c.kind);
    } else if (state.isSpymaster && state.smView) {
      const k = state.smView[i].kind;
      cls.push('sm-' + k);
    }
    const myTurn = state.currentTeam === state.myTeam;
    const canGuess = !state.isSpymaster && myTurn && state.currentClue && state.guessesLeft > 0 && !c.revealed && state.phase !== 'gameOver';
    if (!canGuess) cls.push('locked');
    return `<div class="${cls.join(' ')}" data-i="${i}">${esc(c.word)}</div>`;
  }

  function bindGame(){
    document.querySelectorAll('.tile').forEach(el => {
      if (el.classList.contains('locked') || el.classList.contains('revealed')) return;
      el.addEventListener('click', () => send({type:'guess', index: parseInt(el.dataset.i,10)}));
    });
    const submit = document.getElementById('submit-clue');
    if (submit) submit.addEventListener('click', () => {
      const clue = document.getElementById('clue').value.trim();
      const num = parseInt(document.getElementById('num').value, 10) || 0;
      if (!clue) return;
      state.clueText = clue; state.clueNumber = num;
      send({type:'clue', clue, number:num});
    });
    const et = document.getElementById('end-turn');
    if (et) et.addEventListener('click', () => send({type:'end_turn'}));
  }

  function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  render();
})();
</script>
</body>
</html>
