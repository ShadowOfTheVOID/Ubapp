<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Secret Hitler</title>
<style>
  :root { color-scheme: dark; --bg:#0d1117; --card:#161b22; --card2:#21262d;
    --line:#30363d; --text:#e6edf3; --muted:#9da7b3; --accent:#7c3aed;
    --danger:#f85149; --good:#2ea043; --warn:#d29922; --lib:#2d6cdf; --fas:#c2410c; }
  * { box-sizing: border-box; }
  body { margin:0; padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    background:var(--bg); color:var(--text); font-family:-apple-system, system-ui, sans-serif; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 0; }
  h1 { font-size: 28px; margin: 0 0 16px; }
  h2 { font-size: 14px; margin: 20px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
  .card { background:var(--card); border-radius:16px; padding:20px; margin-bottom:16px; }
  button, input[type=text] { width:100%; font-size:16px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--line); background:var(--card2); color:var(--text); font-family:inherit; }
  button { background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .pill { display:inline-block; background:var(--card2); padding:4px 10px; border-radius:999px; font-size:12px; color:var(--muted); }
  .pill.you { background:var(--accent); color:#fff; }
  .pill.dead { background:#3a1f23; color:#f85149; }
  .pill.lib { background:#1c3a72; color:#9bbfff; }
  .pill.fas { background:#5a2410; color:#fbb98a; }
  .player { display:flex; align-items:center; justify-content:space-between;
    background:var(--card2); padding:10px 14px; border-radius:10px; margin-bottom:6px; }
  .target { width:100%; background:var(--card2); border:1px solid var(--line);
    color:var(--text); padding:14px; border-radius:12px; font-size:16px; text-align:left;
    cursor:pointer; margin-bottom:6px; }
  .target.selected { background:var(--accent); border-color:var(--accent); color:#fff; }
  .role-card { padding:28px; text-align:center; border-radius:20px; margin-bottom:16px; }
  .role-card.liberal { background:linear-gradient(160deg, #1c3a72, #0d1f3a); }
  .role-card.fascist { background:linear-gradient(160deg, #5a2410, #2a1108); }
  .role-card.hitler  { background:linear-gradient(160deg, #6a1010, #2a0606); }
  .role-card .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:2px; }
  .role-card .name { font-size:36px; font-weight:800; margin-top:8px; }
  .tracks { display:flex; gap:8px; margin-bottom:16px; }
  .track { flex:1; background:var(--card); border-radius:12px; padding:12px; text-align:center; }
  .track.lib .pips { color:var(--lib); }
  .track.fas .pips { color:var(--fas); }
  .track .label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  .track .pips { font-size:20px; font-weight:700; margin-top:4px; }
  .gov { display:flex; gap:8px; }
  .gov > div { flex:1; }
  .vote-row { display:flex; gap:8px; }
  .vote-row button { flex:1; }
  .vote-ja { background:var(--good); }
  .vote-nein { background:var(--danger); }
  .policy { background:var(--card2); padding:14px; border-radius:10px; margin-bottom:8px;
    font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .policy.lib { border-left:6px solid var(--lib); }
  .policy.fas { border-left:6px solid var(--fas); }
  .small { color:var(--muted); font-size:13px; }
  .center { text-align:center; }
  .tutorial-banner { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#6ee7a8; padding:16px; border-radius:16px; margin-bottom:16px; text-align:center; font-weight:600; }
  .tutorial-card { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#e6edf3; padding:20px; border-radius:16px; margin-bottom:16px; }
  .tutorial-card h2 { color:#6ee7a8; font-size:18px; margin:0 0 8px; letter-spacing:0; text-transform:none; }
  .tutorial-card h3 { font-size:14px; margin:12px 0 4px; color:#e6edf3; text-transform:none; letter-spacing:0; }
  .tutorial-card p { margin:4px 0; color:#cfd8de; font-size:14px; line-height:1.45; }
  .tutorial-card .menu-label { color:#6ee7a8; font-size:16px; margin:18px 0 6px; font-weight:700; }
  .tutorial-card .wait { color:#9da7b3; font-size:13px; margin-top:14px; }
  /* ===== unified ubapp chrome: ubapp design system (redesign) =====
     Appended last so it wins the cascade. Refines shared shell + tokens to
     the brand spec; per-game structural CSS above is left intact. ===== */
  :root{
    --bg:#0a0a0a; --ink:#000000; --fg:#ffffff;
    --accent:#ff2e88; --accent-ink:#2a0010;
    --accent-soft:rgba(255,46,136,0.14); --accent-line:rgba(255,46,136,0.45);
    --card:#141416; --card2:#1c1c1f; --surface-hi:#1c1c1f;
    --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.14);
    --text:#ffffff; --muted:rgba(255,255,255,0.58); --faint:rgba(255,255,255,0.38);
    --online:#3ddc84;
    --sys:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--sys);
    display:flex; flex-direction:column; min-height:100%;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  .wrap{ width:100%; max-width:600px; margin:auto; padding:20px 0; text-align:center; }
  .target{ text-align:center; }
  h1{ font-size:28px; font-weight:800; letter-spacing:-0.03em; margin:0 0 14px; color:var(--fg); }
  h2{ font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--muted); margin:18px 0 8px; }
  p{ color:var(--text); }
  p.small,.small{ color:var(--muted); font-size:13px; }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:12px; }
  button, input[type=text]{ width:100%; font-size:16px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--line-strong); background:rgba(255,255,255,0.06); color:var(--text);
    font-family:inherit; box-sizing:border-box; }
  button{ background:var(--accent); color:var(--accent-ink); border:none; font-weight:700;
    cursor:pointer; letter-spacing:-0.01em; transition:filter .12s, opacity .12s; }
  button:hover{ filter:brightness(1.06); }
  button:active{ filter:brightness(0.96); }
  button:disabled{ opacity:.5; cursor:not-allowed; filter:none; }
  button.gray, button.secondary{ background:rgba(255,255,255,0.06); color:var(--text);
    border:1px solid var(--line-strong); font-weight:600; }
  input[type=text]{ background:rgba(255,255,255,0.04); }
  input[type=text]:focus{ outline:none; border-color:var(--accent-line); }
  .players{ display:flex; gap:8px; overflow-x:auto; padding:8px 0; }
  .pchip{ background:var(--card); border:1px solid var(--line); padding:8px 12px;
    border-radius:12px; min-width:96px; flex:0 0 auto; text-align:left; color:var(--text); }
  .pchip.current{ background:var(--accent-soft); border-color:var(--accent-line); color:var(--text); }
  .pchip .name{ font-size:13px; font-weight:600; }
  .pchip .hc{ font-family:var(--mono); font-size:9px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--faint); opacity:1; }
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center;
    justify-content:center; z-index:99; backdrop-filter:blur(10px); }
  .modal .panel{ max-width:360px; width:90%; border-radius:18px; }
  .vote-row{ display:flex; gap:8px; }
  .vote-row button{ flex:1; }
  .vote-yes{ background:var(--accent); color:var(--accent-ink); border:none; }
  .vote-no{ background:rgba(255,255,255,0.06); color:var(--text); border:1px solid var(--line-strong); }
  .vote-yes.selected, .vote-no.selected{ outline:2px solid var(--fg); outline-offset:1px; }
  /* tutorial card recolor — magenta brand instead of legacy green */
  .tutorial-banner{ background:var(--accent-soft); border:1px solid var(--accent-line);
    color:var(--fg); border-radius:16px; }
  .tutorial-card{ background:var(--accent-soft); border:1px solid var(--accent-line);
    color:var(--text); border-radius:16px; }
  .tutorial-card h2{ color:var(--accent); font-family:var(--sys); font-size:18px;
    letter-spacing:-0.02em; text-transform:none; }
  .tutorial-card h3{ color:var(--fg); }
  .tutorial-card p{ color:var(--muted); }
  .tutorial-card .menu-label{ color:var(--accent); }
  .tutorial-card .wait{ color:var(--faint); }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
(() => {
  const root = document.getElementById('root');
  const ws = new WebSocket(`wss://${location.host}/ws`);

  // Keep the screen awake while connected so the device's inactivity
  // timeout can't sleep the screen, drop this socket and kick the player.
  let wakeLock = null;
  async function requestWakeLock() {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
  if ('wakeLock' in navigator) {
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  }

  const state = {
    me: null,
    phase: 'lobby',
    players: [],
    presidentId: null, chancellorNomineeId: null, chancellorId: null,
    liberalPolicies: 0, fascistPolicies: 0, electionTracker: 0,
    vetoUnlocked: false, vetoRequested: false,
    eligibleChancellors: [], voteProgress: 0, voteTotal: 0,
    investigatedIds: [],
    canStart: false,
    role: null, allies: [],
    presidentialHand: null, chancellorHand: null,
    peekedPolicies: null, investigationResult: null,
    myJa: null, picked: null, voted: false,
    lastEvent: null,
    finalRoles: null, winner: null, reason: null,
    tutorial: { isOpen:false, yesCount:0, noCount:0, eligibleCount:0, result:null, tutorialShown:false },
    tutorialContent: null, myTutorialVote: null, tutorialPage: 0,
  };

  function send(o) { if (ws.readyState === 1) ws.send(JSON.stringify(o)); }

  ws.addEventListener('message', e => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    switch (m.type) {
      case 'welcome': state.me = { id: m.yourId, name: m.yourName }; break;
      case 'role':    state.role = m.role; state.allies = m.allies || []; break;
      case 'state':
        Object.assign(state, {
          phase: m.phase, players: m.players,
          presidentId: m.presidentId, chancellorNomineeId: m.chancellorNomineeId, chancellorId: m.chancellorId,
          liberalPolicies: m.liberalPolicies, fascistPolicies: m.fascistPolicies,
          electionTracker: m.electionTracker, vetoUnlocked: m.vetoUnlocked, vetoRequested: m.vetoRequested,
          eligibleChancellors: m.eligibleChancellors || [],
          voteProgress: m.voteProgress, voteTotal: m.voteTotal,
          investigatedIds: m.investigatedIds || [], canStart: m.canStart,
        });
        // reset per-phase scratch
        if (state.phase !== 'election') { state.myJa = null; state.voted = false; }
        if (state.phase !== 'presidentDiscard') state.presidentialHand = null;
        if (state.phase !== 'chancellorEnact' && state.phase !== 'vetoDecision') state.chancellorHand = null;
        if (state.phase !== 'policyPeek') state.peekedPolicies = null;
        if (state.phase !== 'investigationReveal') state.investigationResult = null;
        state.picked = null;
        break;
      case 'lobby': state.players = m.players; state.phase = 'lobby'; break;
      case 'vote_progress':
        state.voteProgress = m.voteProgress; state.voteTotal = m.voteTotal; break;
      case 'election_result':
        state.lastEvent = { kind: 'election', passed: m.passed, votes: m.votes };
        state.electionTracker = m.electionTracker;
        break;
      case 'policy_enacted':
        state.lastEvent = { kind: 'policy', policy: m.policy, byChaos: m.byChaos };
        state.liberalPolicies = m.liberalPolicies; state.fascistPolicies = m.fascistPolicies;
        break;
      case 'veto_confirmed':
        state.lastEvent = { kind: 'veto' };
        state.electionTracker = m.electionTracker;
        break;
      case 'executed':
        state.lastEvent = { kind: 'executed', playerId: m.playerId };
        break;
      case 'presidential_hand': state.presidentialHand = m.policies; break;
      case 'chancellor_hand':   state.chancellorHand = m.policies; state.vetoUnlocked = m.vetoUnlocked; break;
      case 'policy_peek':       state.peekedPolicies = m.policies; break;
      case 'investigation_result':
        state.investigationResult = { subjectId: m.subjectId, party: m.party }; break;
      case 'game_over':
        state.finalRoles = m.roles; state.winner = m.winner; state.reason = m.reason;
        break;
      case 'tutorial_vote_state': {
        const wasOpen = state.tutorial.isOpen;
        state.tutorial = { isOpen: m.isOpen, yesCount: m.yesCount, noCount: m.noCount,
          eligibleCount: m.eligibleCount, result: m.result, tutorialShown: m.tutorialShown };
        if (m.title) state.tutorialContent = { title: m.title, sections: m.sections || [], menuSections: m.menuSections || [] };
        if (!wasOpen && m.isOpen) state.myTutorialVote = null;
        break;
      }
      case 'error':  state.lastError = m.message; break;
    }
    render();
  });

  function render() {
    if (!state.me) return renderJoin();
    if (state.phase === 'gameOver') return renderGameOver();
    if (state.phase === 'lobby') return renderLobby();
    renderGame();
  }

  function renderJoin() {
    root.innerHTML = `<h1>Secret Hitler</h1>
      <div class="card"><h2>Pick a name</h2>
      <input id="n" type="text" placeholder="Your name" maxlength="20" autofocus>
      <div style="height:12px"></div><button id="b">Join</button></div>`;
  }

  function renderLobby() {
    root.innerHTML = `<h1>Lobby</h1>${viewTutorialBanner()}${viewTutorialVote()}
      <div class="card">
        <p class="small">Waiting for the host to start. 5–10 players.</p>
        <h2>Players (${state.players.length})</h2>
        ${state.players.map(p => `<div class="player">
          <span>${esc(p.name)}${p.isHost ? ' <span class="pill">host</span>' : ''}</span>
          ${state.me.id === p.id ? '<span class="pill you">you</span>' : ''}</div>`).join('')}
      </div>`;
  }

  function renderGame() {
    const roleCard = viewRoleCard();
    const tracks = viewTracks();
    const gov = viewGovernment();
    const phaseBody = viewPhase();
    root.innerHTML = roleCard + tracks + gov + phaseBody;
    bindHandlers();
  }

  function viewRoleCard() {
    const r = state.role;
    if (!r) return '';
    const klass = r === 'liberal' ? 'liberal' : (r === 'hitler' ? 'hitler' : 'fascist');
    const big = r === 'hitler' ? 'HITLER' : (r === 'fascist' ? 'FASCIST' : 'LIBERAL');
    const ally = state.allies && state.allies.length
      ? `<div class="small" style="margin-top:8px">Allies: ${state.allies.map(a => esc(a.name) + (a.role === 'hitler' ? ' (Hitler)' : '')).join(', ')}</div>` : '';
    return `<div class="role-card ${klass}"><div class="label">your role</div>
      <div class="name">${big}</div>${ally}</div>`;
  }

  function viewTracks() {
    return `<div class="tracks">
      <div class="track lib"><div class="label">Liberal</div><div class="pips">${state.liberalPolicies} / 5</div></div>
      <div class="track fas"><div class="label">Fascist</div><div class="pips">${state.fascistPolicies} / 6</div></div>
      <div class="track"><div class="label">Election</div><div class="pips">${state.electionTracker} / 3</div></div>
    </div>`;
  }

  function viewGovernment() {
    const pres = playerName(state.presidentId);
    const chan = playerName(state.chancellorId || state.chancellorNomineeId);
    return `<div class="card gov">
      <div><div class="small">President</div><div><strong>${esc(pres)}</strong></div></div>
      <div><div class="small">Chancellor</div><div><strong>${esc(chan)}</strong></div></div>
    </div>`;
  }

  function viewPhase() {
    const amPresident = state.me && state.presidentId === state.me.id;
    const amChancellor = state.me && state.chancellorId === state.me.id;
    switch (state.phase) {
      case 'nomination':         return amPresident ? viewNominate() : waiting('President is nominating a Chancellor');
      case 'election':           return viewElection();
      case 'presidentDiscard':   return amPresident ? viewPresidentDiscard() : waiting('President is choosing a policy to discard');
      case 'chancellorEnact':    return amChancellor ? viewChancellorEnact() : waiting('Chancellor is enacting a policy');
      case 'vetoDecision':       return amPresident ? viewVetoDecision() : waiting('Chancellor requested a veto — President is deciding');
      case 'policyPeek':         return amPresident ? viewPolicyPeek() : waiting('President is peeking at the top of the deck');
      case 'investigation':      return amPresident ? viewInvestigation() : waiting('President is investigating someone');
      case 'investigationReveal':return amPresident ? viewInvestigationReveal() : waiting('President has an investigation result');
      case 'specialElection':    return amPresident ? viewSpecialElection() : waiting('President is calling a special election');
      case 'execution':          return amPresident ? viewExecution() : waiting('President is choosing someone to execute');
    }
    return '';
  }

  function viewNominate() {
    const list = state.players.filter(p => state.eligibleChancellors.includes(p.id));
    return `<div class="card"><h2>Nominate a Chancellor</h2>${list.map(p =>
      `<button class="target" data-action="nominate" data-id="${p.id}">${esc(p.name)}</button>`).join('')}</div>`;
  }

  function viewElection() {
    const meAlive = (state.players.find(p => p.id === state.me.id) || {}).alive;
    const pres = playerName(state.presidentId);
    const chan = playerName(state.chancellorNomineeId);
    if (!meAlive) return waiting('You are out — election in progress');
    if (state.voted) {
      return `<div class="card center"><p>Vote locked in. ${state.voteProgress} / ${state.voteTotal} have voted.</p></div>`;
    }
    return `<div class="card"><h2>Vote on the government</h2>
      <p class="small">${esc(pres)} as President with ${esc(chan)} as Chancellor.</p>
      <div class="vote-row">
        <button class="vote-ja"   data-action="vote" data-ja="1">Ja!</button>
        <button class="vote-nein" data-action="vote" data-ja="0">Nein!</button>
      </div>
      <p class="small">${state.voteProgress} / ${state.voteTotal} voted</p></div>`;
  }

  function viewPresidentDiscard() {
    if (!state.presidentialHand) return waiting('Waiting for your policies');
    const items = state.presidentialHand.map((p, i) =>
      `<button class="target" data-action="discard" data-i="${i}">
        <span class="policy ${p === 'liberal' ? 'lib' : 'fas'}" style="margin:0;flex:1">
          ${p === 'liberal' ? 'Liberal policy' : 'Fascist policy'}<span class="small">discard</span></span></button>`).join('');
    return `<div class="card"><h2>Discard one</h2>
      <p class="small">The remaining two go to the Chancellor.</p>${items}</div>`;
  }

  function viewChancellorEnact() {
    if (!state.chancellorHand) return waiting('Waiting for your policies');
    const items = state.chancellorHand.map((p, i) =>
      `<button class="target" data-action="enact" data-i="${i}">
        <span class="policy ${p === 'liberal' ? 'lib' : 'fas'}" style="margin:0;flex:1">
          ${p === 'liberal' ? 'Liberal policy' : 'Fascist policy'}<span class="small">enact</span></span></button>`).join('');
    const veto = state.vetoUnlocked
      ? `<button data-action="request_veto" style="background:var(--warn);color:#1a1a1a;margin-top:8px">Request veto</button>` : '';
    return `<div class="card"><h2>Enact one policy</h2>${items}${veto}</div>`;
  }

  function viewVetoDecision() {
    return `<div class="card"><h2>Chancellor wants to veto</h2>
      <p class="small">If you agree, both policies are discarded and the election tracker advances.</p>
      <div class="vote-row">
        <button class="vote-ja" data-action="veto" data-confirm="1">Agree — veto</button>
        <button class="vote-nein" data-action="veto" data-confirm="0">Refuse</button>
      </div></div>`;
  }

  function viewPolicyPeek() {
    if (!state.peekedPolicies) return waiting('Waiting for the deck peek');
    return `<div class="card"><h2>Top three policies</h2>${
      state.peekedPolicies.map((p, i) =>
        `<div class="policy ${p === 'liberal' ? 'lib' : 'fas'}">${i + 1}. ${p === 'liberal' ? 'Liberal' : 'Fascist'}</div>`).join('')
    }<button data-action="ack_peek">Done</button></div>`;
  }

  function viewInvestigation() {
    const targets = state.players.filter(p => p.alive && p.id !== state.presidentId && !state.investigatedIds.includes(p.id));
    return `<div class="card"><h2>Investigate someone's party</h2>${
      targets.map(p => `<button class="target" data-action="investigate" data-id="${p.id}">${esc(p.name)}</button>`).join('')
    }</div>`;
  }

  function viewInvestigationReveal() {
    const r = state.investigationResult;
    if (!r) return waiting('Waiting for the investigation result');
    return `<div class="card"><h2>${esc(playerName(r.subjectId))}</h2>
      <p>Belongs to the <strong>${r.party === 'liberal' ? 'Liberal' : 'Fascist'}</strong> party.</p>
      <p class="small">This is your call — share it truthfully, or lie.</p>
      <button data-action="ack_investigation">Done</button></div>`;
  }

  function viewSpecialElection() {
    const targets = state.players.filter(p => p.alive && p.id !== state.presidentId);
    return `<div class="card"><h2>Pick the next President</h2>${
      targets.map(p => `<button class="target" data-action="special" data-id="${p.id}">${esc(p.name)}</button>`).join('')
    }</div>`;
  }

  function viewExecution() {
    const targets = state.players.filter(p => p.alive && p.id !== state.presidentId);
    return `<div class="card"><h2>Execute a player</h2>${
      targets.map(p => `<button class="target" data-action="execute" data-id="${p.id}">${esc(p.name)}</button>`).join('')
    }</div>`;
  }

  function renderGameOver() {
    const winner = state.winner === 'liberal' ? 'Liberals win' : 'Fascists win';
    const reason = ({
      fiveLiberalPolicies: 'Five Liberal policies enacted.',
      sixFascistPolicies:  'Six Fascist policies enacted.',
      hitlerElectedChancellor: 'Hitler was elected Chancellor.',
      hitlerExecuted:      'Hitler was executed.',
    })[state.reason] || '';
    const roleRows = state.players.map(p => {
      const r = (state.finalRoles || {})[p.id] || '';
      return `<div class="player"><span>${esc(p.name)}</span>
        <span class="pill ${r === 'liberal' ? 'lib' : 'fas'}">${r ? r.charAt(0).toUpperCase() + r.slice(1) : '—'}</span></div>`;
    }).join('');
    root.innerHTML = `<h1>${winner}</h1><div class="card"><p>${reason}</p>${roleRows}</div>`;
  }

  function waiting(msg) { return `<div class="card center small">${msg}…</div>`; }

  function playerName(id) {
    if (!id) return '—';
    const p = state.players.find(x => x.id === id);
    return p ? p.name : id;
  }

  function bindHandlers() {
    document.querySelectorAll('[data-action]').forEach(b => {
      b.addEventListener('click', () => {
        const a = b.dataset.action;
        if (a === 'nominate') send({ type: 'nominate', targetId: b.dataset.id });
        if (a === 'vote') {
          const ja = b.dataset.ja === '1';
          state.myJa = ja; state.voted = true; send({ type: 'vote', ja }); render();
        }
        if (a === 'discard') send({ type: 'discard', index: parseInt(b.dataset.i, 10) });
        if (a === 'enact')   send({ type: 'enact', index: parseInt(b.dataset.i, 10) });
        if (a === 'request_veto') send({ type: 'request_veto' });
        if (a === 'veto')    send({ type: 'veto_response', confirm: b.dataset.confirm === '1' });
        if (a === 'ack_peek') send({ type: 'ack_peek' });
        if (a === 'investigate') send({ type: 'investigate', targetId: b.dataset.id });
        if (a === 'ack_investigation') send({ type: 'ack_investigation' });
        if (a === 'special') send({ type: 'special_election', targetId: b.dataset.id });
        if (a === 'execute') send({ type: 'execute', targetId: b.dataset.id });
      });
    });
    bindJoin(); bindTutorialVote();
  }

  function viewTutorialBanner() {
    const t = state.tutorial, c = state.tutorialContent;
    if (t.result !== true || t.tutorialShown) return '';
    if (!c) return `<div class="tutorial-card">Loading tutorial…</div>`;
    const all = [...c.sections, ...(c.menuSections||[])];
    if (!all.length) return '';
    const pg = state.tutorialPage||0, total = all.length, s = all[pg];
    const prevBtn = pg > 0 ? `<button class="secondary" id="tut-prev" style="flex:1">← Back</button>` : '';
    const nextBtn = pg < total-1 ? `<button id="tut-next" style="flex:1">Next →</button>` : '';
    const waitMsg = pg >= total-1 ? `<p class="wait" style="margin-top:8px">Waiting for the host to finish reading.</p>` : '';
    return `<div class="tutorial-card" style="position:fixed;inset:0;border-radius:0;z-index:100;overflow-y:auto;display:flex;flex-direction:column"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h2 style="margin:0">${esc(c.title)}</h2><span style="color:var(--faint,#9da7b3);font-size:13px">${pg+1} / ${total}</span></div><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p><div style="flex:1"></div>${prevBtn||nextBtn?`<div class="vote-row" style="margin-top:12px">${prevBtn}${nextBtn}</div>`:''}${waitMsg}</div>`;
  }

  function viewTutorialVote() {
    const t = state.tutorial;
    if (t.isOpen) {
      return `<div class="card"><h2>Show tutorial first?</h2>
        <p class="small">${t.yesCount + t.noCount} / ${t.eligibleCount} voted — majority wins.</p>
        <div class="vote-row">
          <button class="vote-ja ${state.myTutorialVote === true ? 'selected' : ''}" id="tut-yes">Yes (${t.yesCount})</button>
          <button class="vote-nein ${state.myTutorialVote === false ? 'selected' : ''}" id="tut-no">No (${t.noCount})</button>
        </div></div>`;
    }
    if (t.result === null && !t.tutorialShown) {
      return `<div class="card"><p class="small">Want a refresher on the rules?</p><button id="call-tut">Call tutorial vote</button></div>`;
    }
    if (t.result === false) return `<div class="card center small">Majority voted to skip the tutorial.</div>`;
    return '';
  }

  function bindTutorialVote() {
    const cb = document.getElementById('call-tut');
    if (cb) cb.addEventListener('click', () => send({ type: 'call_tutorial_vote' }));
    const y = document.getElementById('tut-yes'), n = document.getElementById('tut-no');
    if (y) y.addEventListener('click', () => { state.myTutorialVote = true; send({ type: 'tutorial_vote', yes: true }); render(); });
    if (n) n.addEventListener('click', () => { state.myTutorialVote = false; send({ type: 'tutorial_vote', yes: false }); render(); });
    const prev = document.getElementById('tut-prev'), next = document.getElementById('tut-next');
    if (prev) prev.addEventListener('click', () => { state.tutorialPage = Math.max(0, (state.tutorialPage||0)-1); render(); });
    if (next) next.addEventListener('click', () => { const a = state.tutorialContent ? [...state.tutorialContent.sections, ...(state.tutorialContent.menuSections||[])] : []; state.tutorialPage = Math.min(a.length-1, (state.tutorialPage||0)+1); render(); });
  }

  function bindJoin() {
    const i = document.getElementById('n'), b = document.getElementById('b');
    if (!i || !b) return;
    const submit = () => { const n = i.value.trim(); if (n) send({ type: 'join', name: n }); };
    b.addEventListener('click', submit);
    i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  render();
})();
</script>
<!-- ubapp lobby ad slot — non-disruptive banner for browser guests.
     Degrades silently: if the guest is offline, an ad blocker is active, no
     ad fills, or no publisher id is configured, the banner simply stays
     hidden and the game is unaffected. Lives outside #root so game re-renders
     never clobber it. -->
<style>
  #ub-ad {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: none; justify-content: center; align-items: center;
    min-height: 50px; padding: 6px 8px;
    padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
    background: var(--card, #161b22);
    border-top: 1px solid var(--line, #30363d);
    z-index: 50;
  }
  #ub-ad.ub-show { display: flex; }
  body.ub-ad-on .wrap { padding-bottom: 78px; }
</style>
<div id="ub-ad" role="complementary" aria-label="advertisement">
  <ins class="adsbygoogle"
       style="display:inline-block;width:320px;height:50px"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="0000000000"></ins>
</div>
<script>
(function () {
  // A failed ad must NEVER break the game. Every path below ends with the
  // banner either filled-and-shown or quietly hidden — no thrown errors.
  var AD_CLIENT = 'ca-pub-XXXXXXXXXXXXXXXX'; // TODO: real AdSense publisher id
  var slot = document.getElementById('ub-ad');
  if (!slot) return;

  function hide() {
    slot.classList.remove('ub-show');
    document.body.classList.remove('ub-ad-on');
  }
  function show() {
    slot.classList.add('ub-show');
    document.body.classList.add('ub-ad-on');
  }

  // Host owns the ad-free upgrade → suppress ads for this host's guests.
  if (window.UB_AD_FREE === true) { hide(); return; }
  // Offline → never touch the network.
  if (typeof navigator !== 'undefined' && navigator.onLine === false) { hide(); return; }
  // Placeholder id → stay fully inert (no request) until a real id is set.
  if (AD_CLIENT.indexOf('XXXX') !== -1) { hide(); return; }

  var loaded = false;
  function loadAds() {
    if (loaded) return;
    if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
    loaded = true;
    try {
      var s = document.createElement('script');
      s.async = true;
      s.crossOrigin = 'anonymous';
      s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + AD_CLIENT;
      s.onerror = hide; // offline / blocked → stay hidden
      s.onload = function () {
        try {
          (window.adsbygoogle = window.adsbygoogle || []).push({});
          show();
          // No real fill within 4s → hide so we never leave an empty bar.
          setTimeout(function () {
            if (!slot.querySelector('ins[data-ad-status="filled"]')) hide();
          }, 4000);
        } catch (e) { hide(); }
      };
      document.head.appendChild(s);
    } catch (e) { hide(); }
  }

  try { loadAds(); } catch (e) { hide(); }
  window.addEventListener('offline', hide);
  window.addEventListener('online', function () { try { loadAds(); } catch (e) {} });
})();
</script>
</body>
</html>
