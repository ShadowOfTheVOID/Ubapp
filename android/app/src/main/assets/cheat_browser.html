<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cheat</title>
<style>
  :root { color-scheme: dark; --bg:#000; --table:#0d4429; --card:#141414; --line:#2c2c2e;
    --text:#fff; --muted:#9da7b3; --accent:#ff2e88; --warn:#d29922; --danger:#f85149; --good:#2ea043; }
  * { box-sizing:border-box; }
  html,body{ height:100%; }
  body { margin:0; padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    background:var(--bg); color:var(--text); font-family:-apple-system, system-ui, sans-serif;
    display:flex; flex-direction:column; min-height:100%; }
  .wrap { width:100%; max-width:600px; margin:auto; padding:16px 0; text-align:center; }
  h1 { font-size:24px; margin:0 0 12px; }
  h2 { font-size:13px; margin:18px 0 8px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; }
  .panel { background:var(--card); padding:16px; border-radius:14px; margin-bottom:12px; text-align:left; }
  button, input[type=text] { width:100%; font-size:16px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--line); background:#21262d; color:var(--text); font-family:inherit; }
  button { background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.warn { background:var(--warn); color:#1c1300; }
  button.gray { background:#30363d; color:var(--text); }
  button.danger { background:var(--danger); }
  button.good { background:var(--good); }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }

  .table { background:var(--table); border-radius:18px; padding:18px; text-align:center; margin-bottom:12px;
    box-shadow: inset 0 0 60px rgba(0,0,0,.3); }
  .pile-info { font-size:14px; color:rgba(255,255,255,.85); margin:4px 0; }
  .claim { font-size:18px; font-weight:700; margin:4px 0; }
  .expect { font-size:13px; color:rgba(255,255,255,.7); }

  .players { display:flex; gap:8px; overflow-x:auto; padding:8px 0; }
  .pchip { background:#21262d; padding:8px 12px; border-radius:10px; min-width:90px; flex:0 0 auto; }
  .pchip.current { background:var(--accent); color:#fff; }
  .pchip .name { font-size:13px; font-weight:600; }
  .pchip .hc { font-size:11px; opacity:.8; }

  .hand { display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:rgba(0,0,0,.2); border-radius:14px;
    justify-content:center; }
  .card { width:64px; height:90px; background:#101013; color:#F4F4F6; border-radius:6px; padding:6px; cursor:pointer; user-select:none;
    border:1px solid rgba(255,255,255,0.10);
    display:flex; flex-direction:column; justify-content:space-between; box-shadow:0 8px 24px -8px rgba(0,0,0,0.35); transition:transform .12s;
    font-family:-apple-system, system-ui, sans-serif; }
  .card .rank { font-weight:800; letter-spacing:-0.04em; }
  .card.red { color:#FF3D5A; }
  .card.selected { transform:translateY(-12px); box-shadow:0 8px 16px rgba(0,0,0,.5); outline:3px solid var(--accent); }
  .card .rank { font-size:18px; font-weight:700; line-height:1; }
  .card .suit { font-size:24px; line-height:1; align-self:flex-end; }

  .reveal { background:rgba(255,255,255,.07); border:1px solid var(--line); padding:12px; border-radius:12px; margin:12px 0; }
  .reveal h3 { margin:0 0 6px; font-size:15px; }
  .reveal .strip { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin-top:6px; }

  .tutorial-card { background:linear-gradient(160deg, #1d4a36, #0d2a1f); color:#e6edf3; padding:20px; border-radius:14px; margin-bottom:12px; }
  .tutorial-card h2 { color:#6ee7a8; font-size:18px; margin:0 0 8px; letter-spacing:0; text-transform:none; }
  .tutorial-card h3 { font-size:14px; margin:12px 0 4px; color:#e6edf3; text-transform:none; letter-spacing:0; }
  .tutorial-card p { margin:4px 0; color:#cfd8de; font-size:14px; line-height:1.45; }
  .tutorial-card .menu-label { color:#6ee7a8; font-size:16px; margin:18px 0 6px; font-weight:700; }
  .tutorial-card .wait { color:#9da7b3; font-size:13px; margin-top:14px; }
  .vote-row { display:flex; gap:8px; }
  .vote-row button { flex:1; }
  .vote-yes { background:#2ea043; }
  .vote-no { background:#f85149; }
  .vote-yes.selected, .vote-no.selected { outline:3px solid #fff; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
(() => {
  const root = document.getElementById('root');
  const ws = new WebSocket(`wss://${location.host}/ws`);
  let wakeLock = null;
  async function requestWakeLock() { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
  if ('wakeLock' in navigator) {
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  }
  const state = { me:null, phase:'lobby', players:[], hand:[], pileSize:0, expectedRank:1,
    lastPlay:null, lastReveal:null, currentId:null, winnerId:null, lastEvent:'',
    selected:new Set(), options:{freeClaim:false},
    tutorial:{isOpen:false,yesCount:0,noCount:0,eligibleCount:0,result:null,tutorialShown:false},
    tutorialContent:null, myTutorialVote:null };

  function send(o){ if (ws.readyState===1) ws.send(JSON.stringify(o)); }

  ws.addEventListener('message', e => {
    let m; try { m=JSON.parse(e.data); } catch { return; }
    switch (m.type) {
      case 'welcome': state.me = { id:m.yourId, name:m.yourName }; break;
      case 'lobby': state.players = m.players; state.phase='lobby'; break;
      case 'options':
        state.options = { freeClaim: !!m.freeClaim };
        break;
      case 'state':
        Object.assign(state, {
          phase:m.phase, players:m.players, currentId:m.currentId,
          pileSize:m.pileSize, expectedRank:m.expectedRank,
          lastPlay:m.lastPlay || null, lastReveal:m.lastReveal || null,
          winnerId:m.winnerId || null, lastEvent:m.lastEvent || '',
        });
        state.selected = new Set();
        break;
      case 'hand': state.hand = m.cards; break;
      case 'over': state.phase='gameOver'; state.winnerId=m.winnerId; state.players=m.players; break;
      case 'reset':
        state.phase='lobby'; state.hand=[]; state.winnerId=null; state.lastPlay=null;
        state.lastReveal=null; state.pileSize=0; state.lastEvent=''; break;
      case 'tutorial_vote_state': {
        const wasOpen = state.tutorial.isOpen;
        state.tutorial = { isOpen:m.isOpen, yesCount:m.yesCount, noCount:m.noCount,
          eligibleCount:m.eligibleCount, result:m.result, tutorialShown:m.tutorialShown };
        if (m.title) state.tutorialContent = { title:m.title, sections:m.sections || [], menuSections:m.menuSections || [] };
        if (!wasOpen && m.isOpen) state.myTutorialVote = null;
        break;
      }
    }
    render();
  });

  function rankShort(r){ return ({1:'A',11:'J',12:'Q',13:'K'}[r] || String(r)); }
  function rankName(r){ return ({1:'Aces',11:'Jacks',12:'Queens',13:'Kings'}[r] || (r+'s')); }
  function suitGlyph(s){ return ({clubs:'♣',diamonds:'♦',hearts:'♥',spades:'♠'}[s] || ''); }
  function suitIsRed(s){ return s==='diamonds' || s==='hearts'; }
  function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function nameOf(id){ const p = state.players.find(x => x.id===id); return p ? p.name : '?'; }

  function render(){
    if (!state.me) {
      root.innerHTML = `<h1>Cheat</h1><div class="panel"><h2>Pick a name</h2><input id="n" type="text" placeholder="Your name" maxlength="20" autofocus><div style="height:12px"></div><button id="b">Join</button></div>`;
      bindJoin(); return;
    }
    if (state.phase==='lobby') return renderLobby();
    if (state.phase==='gameOver') return renderOver();
    return renderTable();
  }

  function bindJoin(){
    const i=document.getElementById('n'), b=document.getElementById('b');
    if (!i||!b) return;
    const submit=()=>{ const n=i.value.trim(); if (n) send({type:'join', name:n}); };
    b.addEventListener('click', submit);
    i.addEventListener('keydown', e => { if (e.key==='Enter') submit(); });
  }

  function viewOptions(){
    const o = state.options;
    const line = o.freeClaim ? 'free claim — any rank' : 'sequence rule (A→K→A)';
    return `<div class="panel"><h2>Game options</h2><p>${line}</p></div>`;
  }

  function renderLobby(){
    root.innerHTML = `<h1>Lobby</h1>${viewTutorialBanner()}${viewTutorialVote()}${viewOptions()}<div class="panel"><p>Waiting for the host to deal.</p><h2>Players (${state.players.length})</h2>${state.players.map(p=>`<div class="pchip" style="margin-bottom:6px"><div class="name">${esc(p.name)}${p.isHost?' • host':''}${state.me.id===p.id?' • you':''}</div></div>`).join('')}</div>`;
    bindTutorialVote();
  }

  function viewTutorialBanner(){
    const t = state.tutorial, c = state.tutorialContent;
    if (t.result !== true || t.tutorialShown) return '';
    if (!c) return `<div class="tutorial-card">Loading tutorial…</div>`;
    const ruleSecs = c.sections.map(s => `<div><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('');
    const menuSecs = (c.menuSections || []).map(s => `<div><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join('');
    return `<div class="tutorial-card"><h2>${esc(c.title)}</h2>${ruleSecs}${menuSecs ? `<div class="menu-label">Using this screen</div>${menuSecs}` : ''}<p class="wait">Waiting for the host to finish reading.</p></div>`;
  }

  function viewTutorialVote(){
    const t = state.tutorial;
    if (t.isOpen) {
      return `<div class="panel"><h2>Show tutorial first?</h2><p>${t.yesCount + t.noCount} / ${t.eligibleCount} voted — majority wins.</p><div class="vote-row"><button class="vote-yes ${state.myTutorialVote===true?'selected':''}" id="tut-yes">Yes (${t.yesCount})</button><button class="vote-no ${state.myTutorialVote===false?'selected':''}" id="tut-no">No (${t.noCount})</button></div></div>`;
    }
    if (t.result === null && !t.tutorialShown) {
      return `<div class="panel"><p>Want a refresher on the rules?</p><button id="call-tut">Call tutorial vote</button></div>`;
    }
    if (t.result === false) return `<div class="panel"><p>Majority voted to skip the tutorial.</p></div>`;
    return '';
  }

  function bindTutorialVote(){
    const cb = document.getElementById('call-tut');
    if (cb) cb.addEventListener('click', () => send({type:'call_tutorial_vote'}));
    const y = document.getElementById('tut-yes'), n = document.getElementById('tut-no');
    if (y) y.addEventListener('click', () => { state.myTutorialVote=true; send({type:'tutorial_vote', yes:true}); render(); });
    if (n) n.addEventListener('click', () => { state.myTutorialVote=false; send({type:'tutorial_vote', yes:false}); render(); });
  }

  function renderTable(){
    const isMyTurn = state.currentId === state.me.id;
    const playersBar = state.players.map(p =>
      `<div class="pchip ${state.currentId===p.id?'current':''}"><div class="name">${esc(p.name)}${state.me.id===p.id?' (you)':''}</div><div class="hc">${p.handCount} cards</div></div>`).join('');

    const claimLine = state.lastPlay
      ? `<div class="claim">${esc(nameOf(state.lastPlay.playerId))} claimed ${state.lastPlay.count} × ${rankName(state.lastPlay.claimedRank)}</div>`
      : '<div class="claim">No open play</div>';

    let revealHtml = '';
    if (state.lastReveal) {
      const r = state.lastReveal;
      const cards = r.cards.map(c => `<div class="card ${suitIsRed(c.suit)?'red':''}" style="width:48px;height:72px"><div class="rank">${rankShort(c.rank)}</div><div class="suit">${suitGlyph(c.suit)}</div></div>`).join('');
      revealHtml = `<div class="reveal"><h3>${r.truthful ? 'Truthful claim' : 'Caught cheating!'}</h3><p>${esc(nameOf(r.callerId))} called BS on ${esc(nameOf(r.accusedId))} (${rankName(r.claimedRank)}) — ${esc(nameOf(r.loserId))} picks up.</p><div class="strip">${cards}</div></div>`;
    }

    const handHtml = state.hand.map(c => {
      const key = `${c.suit}-${c.rank}`;
      const cls = ['card', suitIsRed(c.suit)?'red':'', state.selected.has(key)?'selected':''].join(' ');
      return `<div class="${cls}" data-key="${key}" data-suit="${c.suit}" data-rank="${c.rank}"><div class="rank">${rankShort(c.rank)}</div><div class="suit">${suitGlyph(c.suit)}</div></div>`;
    }).join('');

    let pendingHtml = '';
    if (state.phase === 'pendingWin') {
      const w = nameOf(state.winnerId);
      if (state.me.id !== state.winnerId) {
        pendingHtml = `<div class="panel"><h2>Pending win</h2><p>${esc(w)} claims their last play (${state.lastPlay ? rankName(state.lastPlay.claimedRank) : ''}). Call BS or accept.</p><div class="row"><button class="danger" id="pw-bs">Call BS</button><button class="good" id="pw-acc">Accept win</button></div></div>`;
      } else {
        pendingHtml = `<div class="panel"><h2>Pending win</h2><p>Waiting for the others to call BS or accept your win.</p></div>`;
      }
    }

    let actionsHtml = '';
    const canBs = state.lastPlay && state.lastPlay.playerId !== state.me.id && state.phase === 'playing';
    if (canBs) actionsHtml += `<button class="danger" id="bs">Call BS</button>`;
    if (isMyTurn && state.phase === 'playing') {
      const count = state.selected.size;
      actionsHtml += `<button id="play" ${count===0?'disabled':''}>Play ${count} × ${rankName(state.expectedRank)}</button>`;
    }

    root.innerHTML = `
      <div class="players">${playersBar}</div>
      <div class="table">
        <div class="pile-info">Pile: ${state.pileSize} card${state.pileSize===1?'':'s'}</div>
        ${claimLine}
        <div class="expect">Next expected: ${rankName(state.expectedRank)}</div>
        ${state.lastEvent ? `<div class="pile-info" style="opacity:.7;margin-top:8px">${esc(state.lastEvent)}</div>` : ''}
      </div>
      ${revealHtml}
      ${pendingHtml}
      ${isMyTurn && state.phase==='playing' ? `<div class="claim" style="text-align:center">Your turn — claim ${rankName(state.expectedRank)}</div>` : ''}
      <div class="hand">${handHtml || '<p style="color:var(--muted);padding:12px">No cards</p>'}</div>
      ${actionsHtml ? `<div class="row" style="margin-top:8px">${actionsHtml}</div>` : ''}
    `;

    bindTable();
  }

  function renderOver(){
    const winner = state.players.find(p => p.id === state.winnerId);
    root.innerHTML = `<h1>Game over</h1><div class="panel"><p style="text-align:center;font-size:24px;font-weight:700">${esc(winner ? winner.name : '?')} wins!</p>${state.players.map(p=>`<div class="pchip" style="margin-bottom:6px"><div class="name">${esc(p.name)}${p.id===state.winnerId?' 🏆':''}</div><div class="hc">${p.handCount} cards left</div></div>`).join('')}<p style="text-align:center;color:var(--muted);margin-top:16px">Waiting for the host to start a new game…</p></div>`;
  }

  function bindTable(){
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => {
        if (state.currentId !== state.me.id || state.phase !== 'playing') return;
        const key = el.dataset.key;
        if (state.selected.has(key)) state.selected.delete(key); else state.selected.add(key);
        render();
      });
    });
    const playBtn = document.getElementById('play');
    if (playBtn) playBtn.addEventListener('click', () => {
      const cards = state.hand.filter(c => state.selected.has(`${c.suit}-${c.rank}`));
      if (!cards.length) return;
      send({type:'play', claimedRank: state.expectedRank,
            cards: cards.map(c => ({suit:c.suit, rank:c.rank}))});
      state.selected = new Set();
    });
    const bsBtn = document.getElementById('bs');
    if (bsBtn) bsBtn.addEventListener('click', () => send({type:'bs'}));
    const pwBs = document.getElementById('pw-bs');
    if (pwBs) pwBs.addEventListener('click', () => send({type:'bs'}));
    const pwAcc = document.getElementById('pw-acc');
    if (pwAcc) pwAcc.addEventListener('click', () => send({type:'accept_win'}));
  }

  render();
})();
</script>
</body>
</html>
